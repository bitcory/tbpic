<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* ---------- Card scroller (Main) ---------- */
  .scroller-wrap {

    display: flex;
    align-items: stretch;

  .nav-prev { left: 6px; }
  .nav-next { right: 6px; }
  .scroller {
    display: flex;
    gap: 14px;
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    align-items: stretch;
  }
  .scroller::-webkit-scrollbar { display: none; }
  .scroller::before,
  .scroller::after {
    content: '';
    flex: 0 0 6%;
  }
  .card {
    flex: 0 0 auto;
    width: 88%;
    max-width: 380px;
    height: 100%;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    scroll-snap-align: center;
    background: #1E293B;
    box-shadow:
      0 18px 36px -18px rgba(15,23,42,0.35),
      0 4px 10px -4px rgba(15,23,42,0.15);
    transform: scale(0.86) translateY(10px);
    opacity: 0.55;
    transition: transform 0.45s cubic-bezier(.2,.8,.2,1),
                opacity 0.45s cubic-bezier(.2,.8,.2,1),
                box-shadow 0.45s cubic-bezier(.2,.8,.2,1);
    will-change: transform, opacity;
    cursor: pointer;
    transform-origin: center center;
  }
  .card.is-active {
    transform: scale(1) translateY(0);
    opacity: 1;
    box-shadow:
      0 30px 60px -20px rgba(15,23,42,0.5),
      0 10px 20px -10px rgba(0,179,128,0.25);
  }
  .card img {
    transition: transform 0.6s cubic-bezier(.2,.8,.2,1);
    transform: scale(1.08);
  }
  .card.is-active img { transform: scale(1); }
  .card-meta {
    transition: transform 0.45s cubic-bezier(.2,.8,.2,1),
                opacity 0.45s cubic-bezier(.2,.8,.2,1);
    transform: translateY(8px);
    opacity: 0.7;
  }
  .card.is-active .card-meta {
    transform: translateY(0);
    opacity: 1;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    z-index: 1;

  .card img {
    width: 100%; height: 100%;

  }

    left: 0; right: 0; bottom: 0;
    padding: 16px 18px 18px;
    z-index: 2;
    color: #fff;
  }
  .card-tag {

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin: 0;
  }

  /* ---------- Dots ---------- */
  .dots {

    background: linear-gradient(90deg, #00B380, #016837);

  /* ---------- Detail view ---------- */
  .detail-header {
    flex: 0 0 auto;
    padding: 14px 18px 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .back-btn svg { width: 24px; height: 24px; color: #334155; }
  .detail-title {
    margin: 0;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #0F172A;
  }

  .detail-body {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 18px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .detail-body::-webkit-scrollbar { display: none; }

  /* upload swipe area */
  .upload-area {
    position: relative;
    aspect-ratio: 3 / 4;
    border-radius: 20px;
    background: #FFFFFF;
    border: 2px dashed #CBD5E1;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .upload-area input[type=file] { display: none; }
  .upload-track {
    display: flex;
    width: 100%; height: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .upload-track::-webkit-scrollbar { display: none; }
  .upload-slide {
    flex: 0 0 100%;
    width: 100%; height: 100%;
    position: relative;
    scroll-snap-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .upload-slide img {
    width: 100%; height: 100%;
    object-fit: contain;
    background: #F8FAFC;
  }
  .upload-empty {
    color: #334155;
    text-align: center;
    padding: 28px;

  .upload-empty svg { width: 52px; height: 52px; margin-bottom: 14px; color: #00996D; }
  .upload-empty p { margin: 0; font-size: 17px; font-weight: 800; color: #0F172A; }
  .upload-empty span { display: block; margin-top: 6px; font-size: 14px; color: #64748B; }

  .slide-label {
    position: absolute;
    top: 14px; left: 14px;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(15,23,42,0.78);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 2;
  }
  .slide-actions {
    position: absolute;
    bottom: 14px; right: 14px;
    display: flex; gap: 8px;
    z-index: 2;
  }
  .mini-btn {
    height: 40px; padding: 0 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.95);
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    color: #0F172A;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .upload-dots {
    position: absolute;
    bottom: 10px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 5px;
    z-index: 2;

  .upload-dots .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.7); }
  .upload-dots .dot.is-active { width: 18px; background: #fff; }

  /* prompt */
  .prompt-box {
    flex: 0 0 auto;
    background: #FFFFFF;
    border-radius: 18px;
    padding: 16px 18px;
    border: 1px solid #E2E8F0;
  }
  .prompt-box label {
    display: block;
    font-size: 14px;
    font-weight: 800;
    color: #334155;
    margin-bottom: 8px;
  }
  .prompt-box textarea {
    width: 100%;
    min-height: 80px;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 17px;
    color: #0F172A;
    background: transparent;
    line-height: 1.5;
  }
  .prompt-box textarea::placeholder { color: #94A3B8; font-size: 16px; }

  /* ---------- Case picker ---------- */
  .case-picker {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 16px;
    padding: 10px 14px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  }
  .case-picker:hover { border-color: #00B380; background: #F0FDF8; }
  .case-picker:active { transform: scale(0.98); }
  .case-picker-thumb {
    width: 48px; height: 48px;
    border-radius: 12px;
    overflow: hidden;
    flex: 0 0 auto;
    background: #F1F5F9;
  }
  .case-picker-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .case-picker-label { flex: 1 1 auto; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .case-picker-title { font-size: 15px; font-weight: 800; color: #0F172A; }
  .case-picker-sub { font-size: 12px; color: #64748B; }
  .case-picker svg { width: 18px; height: 18px; color: #64748B; flex: 0 0 auto; }

  /* ---------- Case modal ---------- */
  .case-modal {
    position: fixed; inset: 0;
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .case-modal.hidden { display: none; }
  .case-modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(15,23,42,0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .case-modal-sheet {
    position: relative;
    width: 100%;
    max-width: 460px;
    max-height: 85vh;
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 18px 18px 24px;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 -20px 40px -10px rgba(15,23,42,0.25);
  }
  .case-modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .case-modal-head h3 { font-size: 18px; font-weight: 800; color: #0F172A; margin: 0; }
  .case-modal-close {
    width: 36px; height: 36px;
    border: none; background: #F1F5F9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #334155;
  }
  .case-modal-close svg { width: 18px; height: 18px; }
  .case-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    overflow-y: auto;
  }
  .case-item {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s ease, border-color 0.2s ease;
    background: #F1F5F9;
  }
  .case-item:active { transform: scale(0.97); }
  .case-item.is-active { border-color: #00B380; }
  .case-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .case-item-title {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 10px 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.75) 100%);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .case-item.is-active::after {
    content: '';
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #00B380 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12l5 5L20 7'/></svg>") center/14px no-repeat;
  }

  /* action row */
  .action-row {
    flex: 0 0 auto;
    display: flex; gap: 12px;
    padding: 14px 18px calc(18px + env(safe-area-inset-bottom));

  .action-btn {

    height: 64px;
    border: none;
    border-radius: 20px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s ease;

  .action-btn:active { transform: translateY(1px) scale(0.99); }
  .action-btn svg { width: 22px; height: 22px; }
  .action-btn.primary {
    background: linear-gradient(112deg, #68D970 -20%, #00996D 80%);
    color: #fff;
    box-shadow: 0 12px 24px -10px rgba(0,153,109,0.55);

  .action-btn.secondary {
    background: #FFFFFF;
    color: #00996D;
    border: 2px solid #00996D;
  }
  .action-btn:disabled {
    background: #E2E8F0; color: #94A3B8;
    border: none; box-shadow: none;
    cursor: not-allowed;
  }
</style>

  <div class="app">

    <!-- =============== MAIN VIEW =============== -->
    <section class="view" id="viewMain">
      <header>
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8a2 2 0 0 1 2-2h2l2-2h6l2 2h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/>
              <circle cx="12" cy="13" r="4"/>

          nickname: user?.properties?.nickname || user?.kakao_account?.profile?.nickname || '',
          profileImage: img || '',
        }),

      const data = await r.json();

  async function handleRedirectCallback() {
    const url = new URL(window.location.href);
    const code = url.searchParams.get('code');
    const error = url.searchParams.get('error');
    if (error) { history.replaceState({}, '', window.location.pathname); return; }
    if (!code) return;
    try {
      const body = new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: KAKAO_JS_KEY,
        redirect_uri: REDIRECT_URI,
        code,
      });
      const res = await fetch('https://kauth.kakao.com/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' },
        body,
      });
      const data = await res.json();
      if (!data.access_token) throw data;
      Kakao.Auth.setAccessToken(data.access_token);
      localStorage.setItem('tbpic_token', data.access_token);
      const user = await Kakao.API.request({ url: '/v2/user/me' });
      setLoggedIn(user);
    } catch (err) {
      alert('로그인 실패: ' + JSON.stringify(err));
    } finally {
      history.replaceState({}, '', window.location.pathname);
    }

  async function restoreSession() {
    const token = localStorage.getItem('tbpic_token');
    const cached = localStorage.getItem('tbpic_user');
    if (!token) return;
    Kakao.Auth.setAccessToken(token);
    if (cached) { try { setLoggedIn(JSON.parse(cached)); return; } catch (_) {} }
    try {
      const user = await Kakao.API.request({ url: '/v2/user/me' });
      setLoggedIn(user);
    } catch (_) { localStorage.removeItem('tbpic_token'); }
  }

      await handleRedirectCallback();
    } else {
      await restoreSession();
    }
  })();

  /* =========================== Gemini (서버리스 프록시) =========================== */
  function dataUrlToBase64(dataUrl) {
    const [meta, b64] = dataUrl.split(',');
    const mime = meta.match(/data:([^;]+);/)?.[1] || 'image/png';
    return { mime, data: b64 };
  }
  function getKakaoId() {
    try {
      const u = JSON.parse(localStorage.getItem('tbpic_user') || 'null');
      return u?.id ? String(u.id) : null;
    } catch { return null; }
  }
  async function geminiGenerate(prompt, imageDataUrl, styleId) {
    const kakaoId = getKakaoId();
    if (!kakaoId) throw new Error('로그인이 필요합니다');
    const { mime, data } = dataUrlToBase64(imageDataUrl);
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kakaoId, styleId, prompt, imageBase64: data, mimeType: mime }),
    });
    const json = await res.json();
    if (!res.ok) {
      if (res.status === 402) {
        throw new Error(`무료 횟수를 모두 사용했습니다 (${json.used}/${json.quota})`);
      }
      throw new Error(json?.error || 'API 호출 실패');
    }
    if (json.quota !== undefined) {
      localStorage.setItem('tbpic_quota', JSON.stringify({
        quota: json.quota, used: json.used, remaining: json.remaining,
      }));
    }
    return json.dataUrl;
  }

  /* =========================== Main view: cards =========================== */
  const scroller = document.getElementById('scroller');
  const dotsWrap = document.getElementById('dots');
  document.getElementById('styleCount').textContent = `${STYLES.length} styles`;

  STYLES.forEach((s, i) => {
    const card = document.createElement('article');
    card.className = 'card' + (i === 0 ? ' is-active' : '');
    card.dataset.idx = i;
    card.innerHTML = `
      <img src="${s.img}" alt="${s.title}" />
      <div class="card-meta">
        <span class="card-tag">${s.tag}</span>
        <p class="card-title">${s.title}</p>
      </div>`;
    card.addEventListener('click', () => openDetail(i));
    scroller.appendChild(card);

    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' is-active' : '');
    dotsWrap.appendChild(d);
  });
  const cards = [...scroller.querySelectorAll('.card')];
  const dots = [...dotsWrap.children];

  let scrollTicking = false;
  function updateCards() {
    const center = scroller.scrollLeft + scroller.clientWidth / 2;
    let activeIdx = 0, minDist = Infinity;
    const cardW = cards[0] ? cards[0].offsetWidth : 1;
    cards.forEach((c, i) => {
      const cc = c.offsetLeft + c.offsetWidth / 2;
      const dist = cc - center;
      const absDist = Math.abs(dist);
      if (absDist < minDist) { minDist = absDist; activeIdx = i; }
      const ratio = Math.min(absDist / cardW, 1);
      const scale = 1 - ratio * 0.14;
      const translateY = ratio * 10;
      const rotateY = (dist / cardW) * -8;
      const opacity = 1 - ratio * 0.45;
      c.style.transform = `perspective(1000px) translateY(${translateY}px) scale(${scale}) rotateY(${rotateY}deg)`;
      c.style.opacity = opacity;
      c.style.transition = 'none';
    });
    cards.forEach((c, i) => c.classList.toggle('is-active', i === activeIdx));
    dots.forEach((d, i) => d.classList.toggle('is-active', i === activeIdx));
  }
  scroller.addEventListener('scroll', () => {
    if (scrollTicking) return;
    scrollTicking = true;
    requestAnimationFrame(() => {
      updateCards();
      scrollTicking = false;
    });
  }, { passive: true });
  window.addEventListener('load', updateCards);
  window.addEventListener('resize', updateCards);
  requestAnimationFrame(updateCards);

  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');
  function currentActiveIdx() {
    const center = scroller.scrollLeft + scroller.clientWidth / 2;
    let idx = 0, min = Infinity;
    cards.forEach((c, i) => {
      const d = Math.abs(c.offsetLeft + c.offsetWidth / 2 - center);
      if (d < min) { min = d; idx = i; }
    });
    return idx;
  }
  function scrollToIdx(i) {
    i = Math.max(0, Math.min(cards.length - 1, i));
    const c = cards[i];
    if (!c) return;
    const target = c.offsetLeft + c.offsetWidth / 2 - scroller.clientWidth / 2;
    scroller.scrollTo({ left: target, behavior: 'smooth' });
  }
  navPrev.addEventListener('click', () => scrollToIdx(currentActiveIdx() - 1));
  navNext.addEventListener('click', () => scrollToIdx(currentActiveIdx() + 1));
  function updateArrows() {
    const i = currentActiveIdx();
    navPrev.classList.toggle('is-disabled', i <= 0);
    navNext.classList.toggle('is-disabled', i >= cards.length - 1);
  }
  scroller.addEventListener('scroll', updateArrows, { passive: true });
  updateArrows();

  /* =========================== Detail view =========================== */
  const viewMain = document.getElementById('viewMain');
  const viewDetail = document.getElementById('viewDetail');
  const detailTitle = document.getElementById('detailTitle');
  const fileInput = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const uploadTrack = document.getElementById('uploadTrack');
  const slideOriginal = document.getElementById('slideOriginal');
  const uploadEmpty = document.getElementById('uploadEmpty');
  const uploadDots = document.getElementById('uploadDots');
  const promptInput = document.getElementById('promptInput');
  const generateBtn = document.getElementById('generateBtn');
  const autoBtn = document.getElementById('autoBtn');
  const backBtn = document.getElementById('backBtn');

  const promptBox = document.getElementById('promptBox');
  const generateLabel = document.getElementById('generateLabel');
  const autoLabel = document.getElementById('autoLabel');

  let currentStyle = null;
  let currentCaseIdx = 0;
  let originalDataUrl = null;
  let resultDataUrl = null;

  const casePickerBtn = document.getElementById('casePickerBtn');
  const casePickerThumb = document.getElementById('casePickerThumb');
  const casePickerTitle = document.getElementById('casePickerTitle');
  const caseModal = document.getElementById('caseModal');
  const caseModalBackdrop = document.getElementById('caseModalBackdrop');
  const caseModalClose = document.getElementById('caseModalClose');
  const caseGrid = document.getElementById('caseGrid');

  function getActivePrompt() {
    if (!currentStyle) return '';
    if (currentStyle.cases && currentStyle.cases[currentCaseIdx]) {
      const c = currentStyle.cases[currentCaseIdx];
      return c.prompt || currentStyle.prompt;
    }
    return currentStyle.prompt;
  }
  function updateCasePickerUI() {
    if (!currentStyle?.cases?.length) {
      casePickerBtn.classList.add('hidden');
      return;
    }
    const c = currentStyle.cases[currentCaseIdx];
    casePickerBtn.classList.remove('hidden');
    casePickerThumb.src = c.img;
    casePickerTitle.textContent = c.title;
  }
  function renderCaseGrid() {
    caseGrid.innerHTML = '';
    if (!currentStyle?.cases?.length) return;
    currentStyle.cases.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'case-item' + (i === currentCaseIdx ? ' is-active' : '');
      el.innerHTML = `<img src="${c.img}" alt="${c.title}"/><div class="case-item-title">${c.title}</div>`;
      el.addEventListener('click', () => {
        currentCaseIdx = i;
        updateCasePickerUI();
        closeCaseModal();
      });
      caseGrid.appendChild(el);
    });
  }
  function openCaseModal() {
    renderCaseGrid();
    caseModal.classList.remove('hidden');
  }
  function closeCaseModal() {
    caseModal.classList.add('hidden');
  }
  casePickerBtn.addEventListener('click', openCaseModal);
  caseModalBackdrop.addEventListener('click', closeCaseModal);
  caseModalClose.addEventListener('click', closeCaseModal);

  function openDetail(idx) {
    currentStyle = STYLES[idx];
    currentCaseIdx = 0;
    updateCasePickerUI();
    detailTitle.textContent = currentStyle.title;
    if (currentStyle.mode === 'preset') {
      promptBox.classList.add('hidden');
      autoBtn.classList.add('hidden');
      promptInput.value = '';
      generateLabel.textContent = '사진 생성하기';
    } else if (currentStyle.mode === 'dual') {
      promptBox.classList.add('hidden');
      autoBtn.classList.remove('hidden');
      autoLabel.textContent = currentStyle.secondaryLabel || '대안 생성';
      generateLabel.textContent = currentStyle.primaryLabel || '사진 생성하기';
      promptInput.value = '';
    } else if (currentStyle.mode === 'custom') {
      promptBox.classList.remove('hidden');
      autoBtn.classList.add('hidden');
      generateLabel.textContent = '사진 변경하기';
      promptInput.value = '';
      promptInput.placeholder = '예) 배경을 카페로 바꿔주세요\n예) 정장으로 옷을 갈아입혀주세요\n예) 봄꽃이 핀 공원에서 찍은 것처럼 만들어주세요';
    } else {
      promptBox.classList.remove('hidden');
      autoBtn.classList.remove('hidden');
      autoLabel.textContent = '자동 생성';
      generateLabel.textContent = '사진 생성하기';
      promptInput.value = currentStyle.prompt;
      promptInput.placeholder = '원하는 스타일을 자유롭게 적어주세요. 예) 부드러운 자연광, 파스텔톤, 영화같은 분위기';
    }
    resetUpload();
    viewMain.classList.add('is-out-left');
    viewDetail.classList.remove('is-out-right');
  }
  function closeDetail() {
    viewDetail.classList.add('is-out-right');
    viewMain.classList.remove('is-out-left');
  }
  backBtn.addEventListener('click', closeDetail);

  function resetUpload() {
    originalDataUrl = null;
    resultDataUrl = null;
    uploadTrack.innerHTML = '';
    uploadTrack.appendChild(slideOriginal);
    uploadEmpty.classList.remove('hidden');
    uploadDots.classList.add('hidden');
    uploadDots.innerHTML = '';
    const exImg = slideOriginal.querySelector('img');
    if (exImg) exImg.remove();
  }

  uploadArea.addEventListener('click', (e) => {
    if (e.target.closest('.mini-btn')) return;
    fileInput.click();
  });
  async function resizeImageToDataUrl(file, maxSize = 1536, quality = 0.9) {
    const bitmap = await (window.createImageBitmap
      ? createImageBitmap(file)
      : new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = URL.createObjectURL(file);
        }));
    const { width: w, height: h } = bitmap;
    const scale = Math.min(1, maxSize / Math.max(w, h));
    const tw = Math.round(w * scale);
    const th = Math.round(h * scale);
    const canvas = document.createElement('canvas');
    canvas.width = tw;
    canvas.height = th;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, tw, th);
    return canvas.toDataURL('image/jpeg', quality);
  }

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      originalDataUrl = await resizeImageToDataUrl(file);
      renderOriginalSlide();
    } catch (err) {
      console.error(err);
      alert('이미지를 불러오지 못했습니다');
    }
  });

  function renderOriginalSlide() {
    uploadEmpty.classList.add('hidden');
    let img = slideOriginal.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      slideOriginal.appendChild(img);
    }
    img.src = originalDataUrl;
    if (resultDataUrl) renderResultSlide();
  }

  function renderResultSlide() {
    let resultSlide = document.getElementById('slideResult');
    if (!resultSlide) {
      resultSlide = document.createElement('div');
      resultSlide.className = 'upload-slide';
      resultSlide.id = 'slideResult';
      resultSlide.innerHTML = `
        <span class="slide-label" style="background:linear-gradient(112deg,#00B380,#016837)">After</span>
        <img />
        <div class="slide-actions">
          <button class="mini-btn" id="downloadBtn">다운로드</button>
        </div>`;
      uploadTrack.appendChild(resultSlide);
      resultSlide.querySelector('#downloadBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        downloadResult();
      });
    }
    resultSlide.querySelector('img').src = resultDataUrl;
    setupUploadDots();
    requestAnimationFrame(() => {
      uploadTrack.scrollTo({ left: uploadTrack.clientWidth, behavior: 'smooth' });
    });
  }

  function setupUploadDots() {
    const slides = uploadTrack.querySelectorAll('.upload-slide');
    if (slides.length < 2) {
      uploadDots.classList.add('hidden');
      return;
    }
    uploadDots.classList.remove('hidden');
    uploadDots.innerHTML = '';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' is-active' : '');
      uploadDots.appendChild(d);
    });
  }

  uploadTrack.addEventListener('scroll', () => {
    const slides = uploadTrack.querySelectorAll('.upload-slide');
    if (slides.length < 2) return;
    const idx = Math.round(uploadTrack.scrollLeft / uploadTrack.clientWidth);
    [...uploadDots.children].forEach((d, i) => d.classList.toggle('is-active', i === idx));
  }, { passive: true });

  function downloadResult() {
    if (!resultDataUrl) return;
    const a = document.createElement('a');
    a.href = resultDataUrl;
    a.download = `tbpic-${currentStyle.id}-${Date.now()}.png`;
    a.click();
  }

  async function callGenerate(promptText) {
    if (!localStorage.getItem('tbpic_token')) {
      alert('로그인 후 이용 가능합니다.');
      return;
    }
    if (!originalDataUrl) {
      alert('먼저 사진을 업로드해주세요.');
      return;
    }
    generateBtn.disabled = true;
    autoBtn.disabled = true;
    generateLabel.textContent = '생성 중...';
    try {
      const resultUrl = await geminiGenerate(promptText, originalDataUrl, currentStyle.id);
      resultDataUrl = resultUrl;
      renderResultSlide();
    } catch (err) {
      alert('생성 실패: ' + (err?.message || err));
    } finally {
      generateBtn.disabled = false;
      autoBtn.disabled = false;
      generateLabel.textContent = '사진 생성하기';
    }
  }

  generateBtn.addEventListener('click', () => {
    if (currentStyle.mode === 'custom') {
      const userText = promptInput.value.trim();
      if (!userText) {
        alert('어떻게 변경하고 싶은지 입력해주세요');
        promptInput.focus();
        return;
      }
      callGenerate(userText);
      return;
    }
    const basePrompt = getActivePrompt();
    const text = currentStyle.mode === 'preset'
      ? basePrompt
      : (promptInput.value.trim() || basePrompt);
    callGenerate(text);
  });
  autoBtn.addEventListener('click', () => {
    const basePrompt = getActivePrompt();
    const text = currentStyle.mode === 'dual'
      ? (currentStyle.promptSecondary || basePrompt)
      : basePrompt;
    callGenerate(text);
  });
</script>
</body>
</html>
